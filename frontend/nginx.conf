server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://hypothesis-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /assets {
        # If backend serves some assets, proxy them?
        # Actually, frontend build should have assets.
        # But if backend mounts assets (like in original code), we might need this.
        # In this new architecture, frontend serves its own assets.
        try_files $uri $uri/ =404;
    }
}
